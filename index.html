<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Stopwatch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
}

/* Main Container */
.stopwatch {
    background: rgba(255, 255, 255, 0.05);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Time Display */
.time {
    font-size: 2.5rem;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

/* Buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

/* Base Button Style */
button {
    position: relative;
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    overflow: hidden;
    transition: all 0.2s ease;
}

/* Click Press Animation */
button:active {
    transform: scale(0.95);
}

/* Ripple Effect */
button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
}

button:focus:not(:active)::after {
    animation: ripple 0.6s linear;
}

@keyframes ripple {
    0% {
        width: 0;
        height: 0;
        opacity: 0.5;
    }
    100% {
        width: 200%;
        height: 200%;
        opacity: 0;
    }
}

/* Button Colors */
.start { background: #22c55e; color: white; }
.pause { background: #f59e0b; color: white; }
.reset { background: #ef4444; color: white; }
.lap   { background: #3b82f6; color: white; }

/* Hover Glow */
button:hover {
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
    transform: translateY(-2px);
}

/* Running Glow Animation */
.running {
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 5px #22c55e; }
    to { box-shadow: 0 0 20px #22c55e; }
}

/* Disabled State */
button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* Lap List */
.laps {
    max-height: 150px;
    overflow-y: auto;
    text-align: left;
    margin-top: 20px;
}

.laps li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="stopwatch">
    <h1>Stopwatch</h1>

    <div class="time" id="display">00:00:00:000</div>

    <div class="buttons">
        <button id="startBtn" class="start" onclick="start()">Start</button>
        <button id="pauseBtn" class="pause" onclick="pause()" disabled>Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <ul class="laps" id="laps"></ul>
</div>

<script>
let startTime;
let updatedTime;
let difference = 0;
let timerInterval;
let running = false;

const display = document.getElementById("display");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");

function start() {
    if (!running) {
        startTime = new Date().getTime() - difference;
        timerInterval = setInterval(updateTime, 10);
        running = true;

        startBtn.disabled = true;
        pauseBtn.disabled = false;
        startBtn.classList.add("running");
    }
}

function pause() {
    clearInterval(timerInterval);
    running = false;

    startBtn.disabled = false;
    pauseBtn.disabled = true;
    startBtn.classList.remove("running");
}

function reset() {
    clearInterval(timerInterval);
    running = false;
    difference = 0;
    display.innerHTML = "00:00:00:000";
    document.getElementById("laps").innerHTML = "";

    startBtn.disabled = false;
    pauseBtn.disabled = true;
    startBtn.classList.remove("running");
}

function lap() {
    if (running) {
        let li = document.createElement("li");
        li.textContent = "Lap " + 
        (document.getElementById("laps").children.length + 1) +
        " - " + display.innerHTML;
        document.getElementById("laps").appendChild(li);
    }
}

function updateTime() {
    updatedTime = new Date().getTime();
    difference = updatedTime - startTime;

    let hours = Math.floor(difference / (1000 * 60 * 60));
    let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((difference % (1000 * 60)) / 1000);
    let milliseconds = difference % 1000;

    display.innerHTML =
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + ":" +
        String(milliseconds).padStart(3, '0');
}
</script>

</body>
</html>
